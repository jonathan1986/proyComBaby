<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="catalogo.css" rel="stylesheet" />
</head>
<body class="container py-3">
  <h1 class="mb-3">Carrito de Compras</h1>
  <div class="row g-3">
    <div class="col-12 col-lg-8">
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span>Productos</span>
          <button id="btnVaciar" class="btn btn-sm btn-outline-danger">Vaciar</button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm align-middle" id="tablaCarrito">
              <thead>
                <tr>
                  <th style="width: 72px;">Imagen</th>
                  <th>Producto</th>
                  <th class="text-end" style="width: 100px;">Precio</th>
                  <th class="text-center" style="width: 130px;">Cantidad</th>
                  <th class="text-end" style="width: 110px;">Desc.</th>
                  <th class="text-end" style="width: 110px;">Impuesto</th>
                  <th class="text-end" style="width: 120px;">Total</th>
                  <th style="width: 56px;"></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-lg-4">
      <div class="card">
        <div class="card-header">Resumen</div>
        <div class="card-body">
          <div class="mb-2">
            <label class="form-label">Cupón</label>
            <div class="input-group">
              <input id="cupon" class="form-control" placeholder="Código de cupón" />
              <button id="btnAplicarCupon" class="btn btn-outline-primary">Aplicar</button>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label">Costo de envío</label>
            <div class="input-group">
              <span class="input-group-text">Gs.</span>
              <input id="envio" class="form-control" type="number" min="0" step="1000" value="0" />
            </div>
          </div>
          <hr />
          <div class="d-flex justify-content-between"><span>Subtotal</span><span id="r_subtotal">0</span></div>
          <div class="d-flex justify-content-between"><span>Descuento</span><span id="r_descuento">0</span></div>
          <div class="d-flex justify-content-between"><span>Impuesto</span><span id="r_impuesto">0</span></div>
          <div class="d-flex justify-content-between"><span>Envío</span><span id="r_envio">0</span></div>
          <div class="d-flex justify-content-between fw-bold fs-5 mt-2"><span>Total</span><span id="r_total">0</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1080;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function initBasePaths(){
      const currentPath = window.location.pathname.replace(/\\/g,'/');
      const marker = '/modules/CatalogoProductos/Views/';
      let basePath = '/';
      const idx = currentPath.indexOf(marker);
      if (idx !== -1) basePath = currentPath.substring(0, idx + 1);
      window.APP_BASE = basePath;
      window.CATALOGO_BASE = basePath + 'modules/CatalogoProductos/';
    })();
    const API = { carrito: window.CATALOGO_BASE + 'Controllers/carrito_api.php' };
    function escapeHTML(s){return (s??'').toString().replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}
    function showToast(message, type){
      const container = document.getElementById('toastContainer');
      if (!container) { alert(message); return; }
      const el = document.createElement('div');
      const bg = type==='success' ? 'text-bg-success' : type==='danger' ? 'text-bg-danger' : type==='warning' ? 'text-bg-warning' : 'text-bg-secondary';
      el.className = `toast align-items-center ${bg}`;
      el.setAttribute('role','alert'); el.setAttribute('aria-live','assertive'); el.setAttribute('aria-atomic','true');
      el.innerHTML = `<div class="d-flex"><div class="toast-body">${escapeHTML(String(message||''))}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button></div>`;
      container.appendChild(el); const t = new bootstrap.Toast(el, { delay: 2500 }); t.show(); el.addEventListener('hidden.bs.toast', ()=> el.remove());
    }
    function sessionToken(){
      const k='carrito_token'; let t=localStorage.getItem(k); if(!t){ t=crypto.randomUUID(); localStorage.setItem(k,t); } return t;
    }
    async function cargar(){
      const qs = new URLSearchParams({ session_token: sessionToken() });
      const r = await fetch(API.carrito + '?' + qs.toString()); const data = await r.json();
      if (!data.success){ showToast(data.error||'Error', 'danger'); return; }
      render(data);
    }
    function render(data){
      const tbody = document.querySelector('#tablaCarrito tbody');
      const det = Array.isArray(data.detalle) ? data.detalle : [];
      tbody.innerHTML = det.length ? det.map(d=>{
        const img = d.archivo_imagen ? (APP_BASE + escapeHTML(d.archivo_imagen)) : 'https://via.placeholder.com/64x64?text=%20';
        return `<tr data-id="${d.id_producto}">
          <td><img src="${img}" class="img-thumbnail" style="width:64px;height:64px;object-fit:cover"></td>
          <td>${escapeHTML(d.nombre||('ID '+d.id_producto))}</td>
          <td class="text-end">${Number(d.precio_unitario||0).toFixed(0)}</td>
          <td class="text-center">
            <div class="input-group input-group-sm">
              <button class="btn btn-outline-secondary btnMenos" type="button">-</button>
              <input class="form-control text-center inpCant" type="number" min="1" step="1" value="${Number(d.cantidad||1)}">
              <button class="btn btn-outline-secondary btnMas" type="button">+</button>
            </div>
          </td>
          <td class="text-end">${Number(d.descuento_monto||0).toFixed(0)}</td>
          <td class="text-end">${Number(((d.precio_unitario*d.cantidad - d.descuento_monto) * (d.tasa_impuesto/100))||0).toFixed(0)}</td>
          <td class="text-end">${Number(d.total_linea||0).toFixed(0)}</td>
          <td class="text-center"><button class="btn btn-sm btn-outline-danger btnQuitar" title="Quitar">🗑️</button></td>
        </tr>`;
      }).join('') : '<tr><td colspan="8" class="text-muted text-center py-3">Tu carrito está vacío</td></tr>';
      const rsum = data.carrito || {}; 
      document.getElementById('r_subtotal').textContent = Number(rsum.subtotal||0).toFixed(0);
      document.getElementById('r_descuento').textContent = Number(rsum.descuento_total||0).toFixed(0);
      document.getElementById('r_impuesto').textContent = Number(rsum.impuesto_total||0).toFixed(0);
      document.getElementById('r_envio').textContent = Number(rsum.envio_monto||0).toFixed(0);
      document.getElementById('r_total').textContent = Number(rsum.total||0).toFixed(0);
      document.getElementById('cupon').value = rsum.cupon_codigo||'';
      document.getElementById('envio').value = Number(rsum.envio_monto||0);
    }
    async function actualizarCantidad(idProducto, cant){
      const qs = new URLSearchParams({ session_token: sessionToken(), id_carrito: '', });
      const r = await fetch(API.carrito + '?session_token=' + encodeURIComponent(sessionToken()) + '&id_carrito=', { method:'PUT', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({ id_producto:String(idProducto), cantidad:String(cant) }).toString() });
      const data = await r.json(); if(!data.success){ showToast(data.error||'Error', 'danger'); }
      await cargar();
    }
    async function eliminarProducto(idProducto){
      const qs = new URLSearchParams({ session_token: sessionToken(), id_producto:String(idProducto) });
      const r = await fetch(API.carrito + '?' + qs.toString(), { method:'DELETE' }); const data = await r.json();
      if(!data.success){ showToast(data.error||'Error', 'danger'); }
      await cargar();
    }
    async function vaciar(){
      const qs = new URLSearchParams({ session_token: sessionToken(), vaciar:'1' });
      const r = await fetch(API.carrito + '?' + qs.toString(), { method:'DELETE' }); const data = await r.json();
      if(!data.success){ showToast(data.error||'Error', 'danger'); }
      await cargar();
    }
    async function aplicarCupon(codigo){
      const body = { session_token: sessionToken(), accion:'actualizar_cabecera', cupon_codigo: codigo, cupon_descuento: 0 };
      const r = await fetch(API.carrito, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await r.json(); if(!data.success){ showToast(data.error||'No se pudo aplicar cupón', 'danger'); }
      await cargar();
    }
    async function actualizarEnvio(monto){
      const body = { session_token: sessionToken(), accion:'actualizar_cabecera', envio_monto: Number(monto||0) };
      const r = await fetch(API.carrito, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await r.json(); if(!data.success){ showToast(data.error||'No se pudo actualizar envío', 'danger'); }
      await cargar();
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      cargar();
      document.getElementById('tablaCarrito').addEventListener('click', (e)=>{
        const tr = e.target.closest('tr[data-id]'); if(!tr) return; const id = parseInt(tr.getAttribute('data-id'),10);
        if (e.target.closest('.btnMas')){ const inp = tr.querySelector('.inpCant'); actualizarCantidad(id, Number(inp.value||1)+1); }
        else if (e.target.closest('.btnMenos')){ const inp = tr.querySelector('.inpCant'); const n=Math.max(1, Number(inp.value||1)-1); actualizarCantidad(id, n); }
        else if (e.target.closest('.btnQuitar')){ eliminarProducto(id); }
      });
      document.getElementById('tablaCarrito').addEventListener('change', (e)=>{
        const inp = e.target.closest('.inpCant'); if(!inp) return; const tr = e.target.closest('tr[data-id]'); const id = parseInt(tr.getAttribute('data-id'),10); actualizarCantidad(id, Math.max(1, Number(inp.value||1))); 
      });
      document.getElementById('btnVaciar').addEventListener('click', ()=> vaciar());
      document.getElementById('btnAplicarCupon').addEventListener('click', ()=> aplicarCupon(document.getElementById('cupon').value));
      document.getElementById('envio').addEventListener('change', (e)=> actualizarEnvio(e.target.value));
    });
  </script>
</body>
</html>
